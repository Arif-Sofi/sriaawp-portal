name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTH_SECRET: ci-dummy-secret-32-bytes-of-random-data
      DATABASE_URL: postgres://ci:ci@127.0.0.1:54322/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Drizzle schema check
        run: npx drizzle-kit check

      - name: Unit tests
        run: npm test
